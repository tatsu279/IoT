version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Dùng host.docker.internal để kết nối tới PostgreSQL trên máy Windows
      DB_URL: jdbc:postgresql://host.docker.internal:5432/iot_smartlamp
      DB_USER: postgres
      DB_PASS: "123456"
    extra_hosts:
      # Đảm bảo host.docker.internal hoạt động trên mọi nền tảng
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
